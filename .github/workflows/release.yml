name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.3.0)'
        required: true
        default: '0.3.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore OrganizeContacts.sln

      - name: Build (Release, warnings as errors)
        run: dotnet build OrganizeContacts.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test tests/OrganizeContacts.Tests/OrganizeContacts.Tests.csproj -c Release --no-build

      - name: Publish framework-dependent (no self-contained runtime)
        run: |
          dotnet publish src/OrganizeContacts.App/OrganizeContacts.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o publish/OrganizeContacts-${{ github.event.inputs.version }}-win-x64

      - name: Publish portable zip
        run: |
          Compress-Archive `
            -Path publish/OrganizeContacts-${{ github.event.inputs.version }}-win-x64/* `
            -DestinationPath OrganizeContacts-${{ github.event.inputs.version }}-win-x64.zip

      - name: Generate SBOM (dependency manifest)
        run: |
          dotnet list OrganizeContacts.sln package --include-transitive > sbom-${{ github.event.inputs.version }}.txt
          dotnet list OrganizeContacts.sln package --vulnerable --include-transitive >> sbom-${{ github.event.inputs.version }}.txt 2>&1 || $true
        shell: pwsh

      - name: SHA-256
        run: |
          $files = @(
            "OrganizeContacts-${{ github.event.inputs.version }}-win-x64.zip",
            "sbom-${{ github.event.inputs.version }}.txt"
          )
          $files | ForEach-Object {
            $h = Get-FileHash $_ -Algorithm SHA256
            "$($h.Hash)  $(Split-Path $h.Path -Leaf)"
          } | Out-File -Encoding ascii SHA256SUMS.txt

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ github.event.inputs.version }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title "OrganizeContacts $tag" `
              --notes "See CHANGELOG.md for details." `
              --target $env:GITHUB_SHA
          }
          gh release upload $tag `
            OrganizeContacts-${{ github.event.inputs.version }}-win-x64.zip `
            sbom-${{ github.event.inputs.version }}.txt `
            SHA256SUMS.txt `
            --clobber
