name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore OrganizeContacts.sln

      - name: Build (Release)
        run: dotnet build OrganizeContacts.sln -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish src/OrganizeContacts.App/OrganizeContacts.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o publish/OrganizeContacts-${{ github.event.inputs.version }}-win-x64

      - name: Zip artifact
        run: |
          Compress-Archive `
            -Path publish/OrganizeContacts-${{ github.event.inputs.version }}-win-x64/* `
            -DestinationPath OrganizeContacts-${{ github.event.inputs.version }}-win-x64.zip

      - name: SHA-256
        run: |
          $hash = Get-FileHash OrganizeContacts-${{ github.event.inputs.version }}-win-x64.zip -Algorithm SHA256
          "$($hash.Hash)  $(Split-Path $hash.Path -Leaf)" | Out-File -Encoding ascii SHA256SUMS.txt

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ github.event.inputs.version }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title "OrganizeContacts $tag" `
              --notes "See CHANGELOG.md for details." `
              --target $env:GITHUB_SHA
          }
          gh release upload $tag `
            OrganizeContacts-${{ github.event.inputs.version }}-win-x64.zip `
            SHA256SUMS.txt `
            --clobber
